name: Build and release executables
on:
  release:
    types: [published]
  workflow_dispatch:
jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: break-timer-windows.exe
          - os: macos-latest
            artifact_name: break-timer-macos
          - os: ubuntu-latest
            artifact_name: break-timer-linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .
      - name: Build executable
        run: |
          pyinstaller --onefile --windowed --name break-timer run_break_timer.py
      - name: Rename artifact (Windows)
        if: matrix.os == 'windows-latest'
        run: mv dist/break-timer.exe dist/${{ matrix.artifact_name }}
      - name: Rename artifact (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: mv dist/break-timer dist/${{ matrix.artifact_name }}
      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
