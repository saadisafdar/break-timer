name: Build and release executables

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: break-timer-windows.zip
          - os: macos-latest
            artifact_name: break-timer-macos.zip
          - os: ubuntu-latest
            artifact_name: break-timer-linux.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Tk (Linux only)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller .

      # --onedir (not --onefile): a plain folder of files with no runtime
      # self-extraction. --onefile's self-extract-to-temp-and-run behavior
      # is what triggers Defender's Wacatac.B!ml heuristic, independent of
      # UPX compression - onedir avoids that pattern entirely.
      - name: Build executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller --onedir --windowed --noupx --name break-timer --hidden-import=PIL._tkinter_finder --add-data "src/break_timer/assets/sounds;break_timer/assets/sounds" run_break_timer.py

      - name: Build executable (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          pyinstaller --onedir --windowed --noupx --name break-timer --hidden-import=PIL._tkinter_finder --add-data "src/break_timer/assets/sounds:break_timer/assets/sounds" run_break_timer.py

      - name: Zip the app folder (Windows)
        if: matrix.os == 'windows-latest'
        run: Compress-Archive -Path dist/break-timer/* -DestinationPath dist/${{ matrix.artifact_name }}

      - name: Zip the app folder (macOS/Linux)
        if: matrix.os != 'windows-latest'
        run: |
          cd dist/break-timer
          zip -r ../${{ matrix.artifact_name }} .

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}